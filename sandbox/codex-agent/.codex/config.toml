model = "gpt-5.5"
model_reasoning_effort = "low"
service_tier = "fast"
sandbox_mode = "workspace-write"

[projects."/vercel/sandbox/agent-workspace"]
trust_level = "trusted"

[agents]
max_threads = 6
max_depth = 1

[agents.sandbox-verifier]
description = "Verify sandbox config, skill availability, event flow, and smoke evidence."
config_file = "agents/sandbox-verifier.toml"

[agents.x-researcher]
description = "Collect X trend and recent-post signals for Scout using X API bearer auth."
config_file = "agents/x-researcher.toml"

[agents.exa-researcher]
description = "Collect source-backed web evidence for Scout using Exa Search API calls."
config_file = "agents/exa-researcher.toml"

[agents.cap-designer]
description = "Create cap concepts and mock images for Fashion Designer using imagegen."
config_file = "agents/cap-designer.toml"

[agents.sock-designer]
description = "Create sock concepts and mock images for Fashion Designer using imagegen."
config_file = "agents/sock-designer.toml"

[agents.apparel-designer]
description = "Create apparel concepts and mock images for Fashion Designer using imagegen."
config_file = "agents/apparel-designer.toml"

[agents.fashion-reviewer]
description = "Review Fashion Designer image candidates, reject weak assets, and request focused regeneration."
config_file = "agents/fashion-reviewer.toml"

[agents.drop-site-builder]
description = "Create one-page static Builder drop sites using frontend-skill and imagegen."
config_file = "agents/drop-site-builder.toml"

[agents.drop-site-reviewer]
description = "Review Builder drop sites locally with agent-browser on desktop and mobile."
config_file = "agents/drop-site-reviewer.toml"

[agents.drop-site-deployer]
description = "Deploy reviewed Builder static output to drip-websites with Vercel CLI."
config_file = "agents/drop-site-deployer.toml"
