return compact failure JSON with the sanitized blocker plus sanitized stage and
error details. Never include raw account IDs, Page IDs, campaign/ad set/ad/
creative IDs, dashboard URLs, tokens, or raw Graph/CLI JSON.

Return compact JSON:
{
  "status": "created",
  "campaign": {
    "name": "...",
    "safeRef": "campaign:<hash-or-redacted>",
    "configuredStatus": "PAUSED",
    "effectiveStatus": "PAUSED"
  },
  "adSets": [],
