    "activationPerformed": false,
    "insightsReadbackPerformed": false,
    "rawMetaIdsReturned": false,
    "issues": []
  },
  "issues": []
}

Failure JSON:
{
  "status": "failed",
  "blocker": "creative creation failed",
  "stage": "creative",
  "errorCode": "<redacted-or-unknown>",
  "errorSubcode": "<redacted-or-unknown>",
